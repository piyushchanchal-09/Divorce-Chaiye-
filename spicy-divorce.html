<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spicy Divorce Proposal 💔🔥</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ffe0ec, #ffb3b3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
      width: 90%;
      animation: fadeIn 0.6s ease;
    }

    h1 {
      margin-top: 0;
    }

    button {
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .yes-btn {
      background-color: #4CAF50;
      color: white;
    }

    .yes-btn:hover {
      transform: scale(1.1);
    }

    .no-btn {
      background-color: #f44336;
      color: white;
      position: relative;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Dear Nidhi 💌</h1>
    <p>
      After 47 arguments, 12 silent treatments, and 3 dramatic exits...
      I have one important question.
    </p>

    <h2>Will you grant me a stylish, drama-free divorce? 😌</h2>

    <div>
      <button class="yes-btn" onclick="acceptDivorce()">
        Yes, let’s be adults 😇
      </button>
      <button class="no-btn" id="noButton" onmouseover="moveButton()">
        No 😤
      </button>
    </div>

    <div class="message" id="responseMessage"></div>

    <p style="font-size:12px; color:gray; margin-top:30px;">
      *This message was written with sarcasm, sass, and emotional maturity.*
    </p>
  </div>

  <script>
    let noClickCount = 0;

    function acceptDivorce() {
      document.getElementById("responseMessage").innerHTML =
        "🎉 Mutual Freedom Activated! Upgraded from 'married' to 'peaceful strangers'.";
    }

    function moveButton() {
      const button = document.getElementById("noButton");
      const randomX = Math.floor(Math.random() * 200) - 100;
      const randomY = Math.floor(Math.random() * 200) - 100;
      button.style.transform = `translate(${randomX}px, ${randomY}px)`;

      noClickCount++;
      if (noClickCount > 5) {
        document.getElementById("responseMessage").innerHTML =
          "🚨 Denial detected. This behavior confirms my decision. Divorce loading... 99% 😌";
      }
    }
  </script>

</body>
</html>
